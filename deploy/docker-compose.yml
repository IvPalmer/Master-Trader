---
services:
  cluchanix:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    container_name: ft-cluchanix
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8080:8080"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/ClucHAnix.log
      --config /freqtrade/user_data/configs/ClucHAnix.json
      --strategy ClucHAnix

  # combinedbinhandcluc:  # PAUSED — 1W/2L, -$12.41, two stop_loss hits
  #   image: freqtradeorg/freqtrade:stable
  #   restart: unless-stopped
  #   container_name: ft-combinedbinhandcluc
  #   volumes:
  #     - "./user_data:/freqtrade/user_data"
  #   ports:
  #     - "127.0.0.1:8081:8080"
  #   command: >
  #     trade
  #     --logfile /freqtrade/user_data/logs/CombinedBinHAndCluc.log
  #     --config /freqtrade/user_data/configs/CombinedBinHAndCluc.json
  #     --strategy CombinedBinHAndCluc

  nasosv5:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    container_name: ft-nasosv5
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8082:8080"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/NASOSv5.log
      --config /freqtrade/user_data/configs/NASOSv5.json
      --strategy NASOSv5

  elliotv5:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    container_name: ft-elliotv5
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8083:8080"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/ElliotV5.log
      --config /freqtrade/user_data/configs/ElliotV5.json
      --strategy ElliotV5

  supertrendstrategy:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    container_name: ft-supertrendstrategy
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8084:8080"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/SupertrendStrategy.log
      --config /freqtrade/user_data/configs/SupertrendStrategy.json
      --strategy SupertrendStrategy

  # doubleemacrossoverwithtrend:  # PAUSED — worst performer (-4.14 USDT, 0/2 W/L)
  #   image: freqtradeorg/freqtrade:stable
  #   restart: unless-stopped
  #   container_name: ft-doubleemacrossoverwithtrend
  #   volumes:
  #     - "./user_data:/freqtrade/user_data"
  #   ports:
  #     - "127.0.0.1:8085:8080"
  #   command: >
  #     trade
  #     --logfile /freqtrade/user_data/logs/DoubleEMACrossoverWithTrend.log
  #     --config /freqtrade/user_data/configs/DoubleEMACrossoverWithTrend.json
  #     --strategy DoubleEMACrossoverWithTrend

  mastertraderv1:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    container_name: ft-mastertraderv1
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8086:8080"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/MasterTraderV1.log
      --config /freqtrade/user_data/configs/MasterTraderV1.json
      --strategy MasterTraderV1

  mastertraderai:
    image: freqtradeorg/freqtrade:stable_freqai
    restart: unless-stopped
    container_name: ft-mastertraderai
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8087:8080"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/MasterTraderAI.log
      --config /freqtrade/user_data/configs/MasterTraderAI.json
      --strategy MasterTraderAI
      --freqaimodel LightGBMRegressor

  # nostalgiaforinfinityx6:  # KILLED — 0 trades in weeks, slot available for rotation
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.nfi
  #   restart: unless-stopped
  #   container_name: ft-nostalgiaforinfinityx6
  #   volumes:
  #     - "./user_data:/freqtrade/user_data"
  #   ports:
  #     - "127.0.0.1:8089:8080"
  #   command: >
  #     trade
  #     --logfile /freqtrade/user_data/logs/NostalgiaForInfinityX6.log
  #     --config /freqtrade/user_data/configs/NostalgiaForInfinityX6.json
  #     --strategy NostalgiaForInfinityX6

  # ── Monitoring Stack ───────────────────────────────────────────────

  metrics-exporter:
    build:
      context: .
      dockerfile: exporter/Dockerfile
    restart: unless-stopped
    container_name: ft-metrics-exporter
    volumes:
      - "./metrics_exporter.py:/app/metrics_exporter.py:ro"
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - cluchanix
      # - combinedbinhandcluc  # PAUSED
      - nasosv5
      - elliotv5
      - supertrendstrategy
      - mastertraderv1
      - mastertraderai
      # - nostalgiaforinfinityx6  # KILLED

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    container_name: ft-prometheus
    volumes:
      - "./prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "prometheus_data:/prometheus"
    ports:
      - "127.0.0.1:9091:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    depends_on:
      - metrics-exporter

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    container_name: ft-grafana
    volumes:
      - "grafana_data:/var/lib/grafana"
      - "./grafana/provisioning:/etc/grafana/provisioning:ro"
      - "./grafana/dashboards:/var/lib/grafana/dashboards:ro"
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_DEFAULT_THEME=dark
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/freqtrade.json
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
