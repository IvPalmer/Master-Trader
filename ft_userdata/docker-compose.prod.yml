x-healthcheck: &a2
  test:
    - CMD-SHELL
    - curl -sf http://localhost:8080/api/v1/ping || exit 1
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 120s
x-bot-env: &a1
  FREQTRADE__EXCHANGE__KEY: ${FREQTRADE__EXCHANGE__KEY}
  FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE__EXCHANGE__SECRET}
  FREQTRADE__API_SERVER__USERNAME: ${FREQTRADE__API_SERVER__USERNAME}
  FREQTRADE__API_SERVER__PASSWORD: ${FREQTRADE__API_SERVER__PASSWORD}
  FREQTRADE__API_SERVER__JWT_SECRET_KEY: ${FREQTRADE__API_SERVER__JWT_SECRET_KEY}
services:
  keltnerbouncev1:
    image: freqtradeorg/freqtrade:stable
    restart: always
    container_name: ft-keltner-bounce
    environment: *a1
    volumes:
      - ft_user_data:/freqtrade/user_data
      - ./user_data/configs:/freqtrade/user_data/configs:ro
      - ./user_data/strategies:/freqtrade/user_data/strategies
    ports:
      - 127.0.0.1:8095:8080
    healthcheck: *a2
    deploy:
      resources:
        limits:
          memory: 768M
    entrypoint:
      - /bin/sh
      - -c
      - sleep 60 && exec freqtrade trade --logfile /freqtrade/user_data/logs/KeltnerBounceV1.log --config /freqtrade/user_data/configs/KeltnerBounceV1.json --strategy KeltnerBounceV1
  fundingfadev1:
    profiles:
      - live
    image: freqtradeorg/freqtrade:stable
    restart: always
    container_name: ft-funding-fade
    environment: *a1
    volumes:
      - ft_user_data:/freqtrade/user_data
      - ./user_data/configs:/freqtrade/user_data/configs:ro
      - ./user_data/strategies:/freqtrade/user_data/strategies
    ports:
      - 127.0.0.1:8096:8080
    healthcheck: *a2
    deploy:
      resources:
        limits:
          memory: 768M
    entrypoint:
      - /bin/sh
      - -c
      - sleep 70 && exec freqtrade trade --logfile /freqtrade/user_data/logs/FundingFadeV1.log --config /freqtrade/user_data/configs/FundingFadeV1.live.json --strategy FundingFadeV1
  funding-refresh:
    image: freqtradeorg/freqtrade:stable
    restart: always
    container_name: ft-funding-refresh
    user: 1000:1000
    volumes:
      - ft_user_data:/app/user_data
      - ./download_funding_rates.py:/app/download_funding_rates.py:ro
    working_dir: /app
    deploy:
      resources:
        limits:
          memory: 256M
    entrypoint:
      - /bin/sh
      - -c
      - |
        while true; do
          echo "[funding-refresh] $$(date -u +%FT%TZ) starting incremental refresh"
          attempt=1
          for backoff in 5 30 120; do
            if python3 -u /app/download_funding_rates.py --incremental; then
              break
            fi
            echo "[funding-refresh] attempt $$attempt failed; retrying in $${backoff}s"
            sleep "$$backoff"
            attempt=$$((attempt + 1))
          done
          if [ "$$attempt" -gt 3 ]; then
            echo "[funding-refresh] all 3 retries failed; will retry next cycle"
          fi
          echo "[funding-refresh] $$(date -u +%FT%TZ) sleeping 4h"
          sleep 14400
        done
  metrics-exporter:
    build:
      context: .
      dockerfile: exporter/Dockerfile
    restart: unless-stopped
    container_name: ft-metrics-exporter
    environment:
      FREQTRADE__API_SERVER__USERNAME: ${FREQTRADE__API_SERVER__USERNAME}
      FREQTRADE__API_SERVER__PASSWORD: ${FREQTRADE__API_SERVER__PASSWORD}
    volumes:
      - ./metrics_exporter.py:/app/metrics_exporter.py:ro
      - ./api_utils.py:/app/api_utils.py:ro
      - ./bots_config.json:/app/bots_config.json:ro
      - ft_exporter_state:/state
    ports:
      - 127.0.0.1:9090:9090
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      - keltnerbouncev1
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    container_name: ft-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - 127.0.0.1:9091:9090
    deploy:
      resources:
        limits:
          memory: 256M
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=90d
      - --web.enable-lifecycle
      - --web.enable-admin-api
    depends_on:
      - metrics-exporter
  ft-dashboard:
    build: ./ft_dashboard
    restart: unless-stopped
    container_name: ft-dashboard
    networks:
      - default
      - dokploy-network
    environment:
      FREQTRADE__API_SERVER__USERNAME: ${FREQTRADE__API_SERVER__USERNAME}
      FREQTRADE__API_SERVER__PASSWORD: ${FREQTRADE__API_SERVER__PASSWORD}
      POLL_INTERVAL: "30"
      OVERLAYS_DIR: /overlays
    volumes:
      - ./overlays:/overlays:ro
    deploy:
      resources:
        limits:
          memory: 192M
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.master-trader.rule=Host(`master-trader.grooveops.dev`)
      - traefik.http.routers.master-trader.entrypoints=websecure
      - traefik.http.routers.master-trader.tls=true
      - traefik.http.routers.master-trader.tls.certresolver=letsencrypt
      - traefik.http.routers.master-trader.service=master-trader
      - traefik.http.services.master-trader.loadbalancer.server.port=8000
      - traefik.http.routers.master-trader-http.rule=Host(`master-trader.grooveops.dev`)
      - traefik.http.routers.master-trader-http.entrypoints=web
      - traefik.http.routers.master-trader-http.middlewares=master-trader-https-redirect@docker
      - traefik.http.middlewares.master-trader-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.master-trader-https-redirect.redirectscheme.permanent=true
    depends_on:
      - keltnerbouncev1

networks:
  default: null
  dokploy-network:
    external: true
volumes:
  prometheus_data: null
  ft_user_data: null
  ft_exporter_state: null
