x-healthcheck: &a2
  test:
    - CMD-SHELL
    - curl -sf http://localhost:8080/api/v1/ping || exit 1
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 120s
x-bot-env: &a1
  FREQTRADE__EXCHANGE__KEY: ${FREQTRADE__EXCHANGE__KEY}
  FREQTRADE__EXCHANGE__SECRET: ${FREQTRADE__EXCHANGE__SECRET}
  FREQTRADE__API_SERVER__USERNAME: ${FREQTRADE__API_SERVER__USERNAME}
  FREQTRADE__API_SERVER__PASSWORD: ${FREQTRADE__API_SERVER__PASSWORD}
  FREQTRADE__API_SERVER__JWT_SECRET_KEY: ${FREQTRADE__API_SERVER__JWT_SECRET_KEY}
services:
  keltnerbouncev1:
    image: freqtradeorg/freqtrade:stable
    restart: always
    container_name: ft-keltner-bounce
    environment: *a1
    volumes:
      - ft_user_data:/freqtrade/user_data
      - ./user_data/configs:/freqtrade/user_data/configs:ro
      - ./user_data/strategies:/freqtrade/user_data/strategies
    ports:
      - 127.0.0.1:8095:8080
    healthcheck: *a2
    deploy:
      resources:
        limits:
          memory: 768M
    entrypoint:
      - /bin/sh
      - -c
      - sleep 60 && exec freqtrade trade --logfile /freqtrade/user_data/logs/KeltnerBounceV1.log --config /freqtrade/user_data/configs/KeltnerBounceV1.json --strategy KeltnerBounceV1
  fundingfadev1:
    # Re-enabled 2026-05-19 after macro gate v2 (slope + regime halt) upgrade.
    # Pause was triggered by the May 10-16 5-SL streak; new gate's bootstrap
    # P(MaxDD < baseline) = 92.5%. See project_funding_fade_gate_v2_2026-05-19.md.
    image: freqtradeorg/freqtrade:stable
    restart: always
    container_name: ft-funding-fade
    environment: *a1
    volumes:
      - ft_user_data:/freqtrade/user_data
      - ./user_data/configs:/freqtrade/user_data/configs:ro
      - ./user_data/strategies:/freqtrade/user_data/strategies
    ports:
      - 127.0.0.1:8096:8080
    healthcheck: *a2
    deploy:
      resources:
        limits:
          memory: 768M
    entrypoint:
      - /bin/sh
      - -c
      - sleep 70 && exec freqtrade trade --logfile /freqtrade/user_data/logs/FundingFadeV1.log --config /freqtrade/user_data/configs/FundingFadeV1.live.json --strategy FundingFadeV1
  cascadefaderv1:
    image: freqtradeorg/freqtrade:stable
    restart: always
    container_name: ft-cascade-fader
    environment: *a1
    volumes:
      - ft_user_data:/freqtrade/user_data
      - ./user_data/configs:/freqtrade/user_data/configs:ro
      - ./user_data/strategies:/freqtrade/user_data/strategies
    ports:
      - 127.0.0.1:8097:8080
    healthcheck: *a2
    deploy:
      resources:
        limits:
          memory: 768M
    # DRY-RUN. Liquidation-cascade rebound fader (third candidate strategy).
    # Validation: Freqtrade native PF 1.76, 84% WR, max DD 0.51% (Oct 10 2025
    # cascade only) on 39mo backtest. 5/6 walk-forward windows positive.
    # Wins in 2023-H2 where Keltner LOST. See docs/cascade_fader_v1_validation_2026-05-09.md.
    entrypoint:
      - /bin/sh
      - -c
      - mkdir -p /freqtrade/user_data/logs && sleep 80 && exec freqtrade trade --logfile /freqtrade/user_data/logs/CascadeFaderV1.log --config /freqtrade/user_data/configs/CascadeFaderV1.json --strategy CascadeFaderV1
  funding-refresh:
    image: freqtradeorg/freqtrade:stable
    restart: always
    container_name: ft-funding-refresh
    user: 1000:1000
    volumes:
      - ft_user_data:/app/user_data
      - ./download_funding_rates.py:/app/download_funding_rates.py:ro
    working_dir: /app
    deploy:
      resources:
        limits:
          memory: 256M
    entrypoint:
      - /bin/sh
      - -c
      - |
        while true; do
          echo "[funding-refresh] $$(date -u +%FT%TZ) starting incremental refresh"
          attempt=1
          for backoff in 5 30 120; do
            if python3 -u /app/download_funding_rates.py --incremental; then
              break
            fi
            echo "[funding-refresh] attempt $$attempt failed; retrying in $${backoff}s"
            sleep "$$backoff"
            attempt=$$((attempt + 1))
          done
          if [ "$$attempt" -gt 3 ]; then
            echo "[funding-refresh] all 3 retries failed; will retry next cycle"
          fi
          echo "[funding-refresh] $$(date -u +%FT%TZ) sleeping 4h"
          sleep 14400
        done
  metrics-exporter:
    build:
      context: .
      dockerfile: exporter/Dockerfile
    restart: unless-stopped
    container_name: ft-metrics-exporter
    environment:
      FREQTRADE__API_SERVER__USERNAME: ${FREQTRADE__API_SERVER__USERNAME}
      FREQTRADE__API_SERVER__PASSWORD: ${FREQTRADE__API_SERVER__PASSWORD}
    volumes:
      - ./metrics_exporter.py:/app/metrics_exporter.py:ro
      - ./api_utils.py:/app/api_utils.py:ro
      - ./bots_config.json:/app/bots_config.json:ro
      - ft_exporter_state:/state
    ports:
      - 127.0.0.1:9090:9090
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      - keltnerbouncev1
      - cascadefaderv1
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    container_name: ft-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - 127.0.0.1:9091:9090
    deploy:
      resources:
        limits:
          memory: 256M
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=90d
      - --web.enable-lifecycle
      - --web.enable-admin-api
    depends_on:
      - metrics-exporter
  ft-dashboard:
    build: ./ft_dashboard
    restart: unless-stopped
    container_name: ft-dashboard
    networks:
      - default
      - dokploy-network
    environment:
      FREQTRADE__API_SERVER__USERNAME: ${FREQTRADE__API_SERVER__USERNAME}
      FREQTRADE__API_SERVER__PASSWORD: ${FREQTRADE__API_SERVER__PASSWORD}
      POLL_INTERVAL: "30"
      OVERLAYS_DIR: /overlays
      KILLERS_DB: /var/lib/killers/state.sqlite
    volumes:
      - ./overlays:/overlays:ro
      # killers_bot SQLite (read-only) so the dashboard can render the
      # observer-bot's state alongside the Freqtrade fleet.
      - /home/ubuntu/killers-bot/state.sqlite:/var/lib/killers/state.sqlite:ro
    deploy:
      resources:
        limits:
          memory: 192M
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.master-trader.rule=Host(`master-trader.grooveops.dev`)
      - traefik.http.routers.master-trader.entrypoints=websecure
      - traefik.http.routers.master-trader.tls=true
      - traefik.http.routers.master-trader.tls.certresolver=letsencrypt
      - traefik.http.routers.master-trader.service=master-trader
      - traefik.http.services.master-trader.loadbalancer.server.port=8000
      - traefik.http.routers.master-trader-http.rule=Host(`master-trader.grooveops.dev`)
      - traefik.http.routers.master-trader-http.entrypoints=web
      - traefik.http.routers.master-trader-http.middlewares=master-trader-https-redirect@docker
      - traefik.http.middlewares.master-trader-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.master-trader-https-redirect.redirectscheme.permanent=true
    depends_on:
      - keltnerbouncev1
      - cascadefaderv1
  insiders-listener:
    # ft-insiders-listener — Telethon listener for the Insiders Scalp Telegram
    # group. Phase 1: piggybacks on Eduardo's user session. Phase 2: switches
    # to our own session via env var.
    #
    # SCAFFOLD ONLY (2026-05-19) — won't start until insiders-listener image
    # is built AND .session secret is present. Guarded behind `insiders`
    # profile so default `docker compose up` skips it.
    profiles:
      - insiders
    build: ./insiders_bridge
    image: ft-insiders-listener:latest
    restart: unless-stopped
    container_name: ft-insiders-listener
    env_file:
      - ./insiders_bridge/.env
    volumes:
      - insiders_state:/var/lib/insiders
      # Session file mounted as read-only secret. Per-deployment.
      # Path source must be configured in the deployment's docker-compose
      # override; do NOT commit the actual session.
      - ./insiders_bridge/secrets/insiders.session:/run/secrets/insiders.session:ro
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      - insiders-receiver

  insiders-receiver:
    # FastAPI receiver: position graph + classifier dispatcher + freqtrade
    # executor + reconciliation loop. Codex's "actual core product."
    profiles:
      - insiders
    build: ../services/insiders-receiver
    image: ft-insiders-receiver:latest
    restart: unless-stopped
    container_name: ft-insiders-receiver
    environment:
      INSIDERS_INSTANCE_ID: ${INSIDERS_INSTANCE_ID:-palmer-prod}
      INSIDERS_DB: /var/lib/insiders/receiver.sqlite
      INSIDERS_RECONCILE_SEC: "30"
      INSIDERS_RISK_USD: "2.0"
      INSIDERS_MARGIN_USD: "10.0"
      INSIDERS_MAX_LEVERAGE: "30"
      INSIDERS_FT_BASE_URL: http://insidersscalpv1:8080
      INSIDERS_FT_USERNAME: ${FREQTRADE__API_SERVER__USERNAME}
      INSIDERS_FT_PASSWORD: ${FREQTRADE__API_SERVER__PASSWORD}
      INSIDERS_CLAUDE_ENABLED: "true"
      INSIDERS_CLAUDE_TIMEOUT_SEC: "8.0"
      INSIDERS_CLAUDE_BINARY: claude
      # Stale-signal gate (codex hardening, default OFF per trust-signaler frame).
      # Set to seconds (e.g. 18) to enable mechanical age-based reject.
      INSIDERS_STALE_SIGNAL_MAX_SEC: "0"
    volumes:
      - insiders_receiver_state:/var/lib/insiders
      - ./insiders_bridge:/app/insiders_bridge:ro
      # Shared Claude auth — reuse same volume as elder-brain-bot, so
      # /root/.claude in this container has the same Max-subscription
      # credentials. external=true means the volume already exists from
      # claude-assistant stack.
      - claude_auth:/root/.claude
    ports:
      # Host port 8090 (8089 is already taken by killers-receiver). Strategy
      # talks to receiver via internal Docker DNS (`http://insiders-receiver:8089`)
      # so the host mapping is just for ops curl access.
      - "127.0.0.1:8090:8089"
    deploy:
      resources:
        limits:
          memory: 384M
    depends_on:
      - insidersscalpv1

  insidersscalpv1:
    # Futures Freqtrade bot for the Insiders Scalp copy trader. Pass-through
    # strategy — entries/exits all driven by the receiver via REST.
    profiles:
      - insiders
    image: freqtradeorg/freqtrade:stable
    restart: always
    container_name: ft-insiders-scalp
    environment:
      <<: *a1
      INSIDERS_RECEIVER_URL: http://insiders-receiver:8089
    volumes:
      - ft_user_data:/freqtrade/user_data
      - ./user_data/configs:/freqtrade/user_data/configs:ro
      - ./user_data/strategies:/freqtrade/user_data/strategies
    ports:
      - 127.0.0.1:8098:8080
    healthcheck: *a2
    deploy:
      resources:
        limits:
          memory: 768M
    entrypoint:
      - /bin/sh
      - -c
      - sleep 90 && exec freqtrade trade --logfile /freqtrade/user_data/logs/InsidersScalpV1.log --config /freqtrade/user_data/configs/InsidersScalpV1.json --strategy InsidersScalpV1

  # ── killers (binance killers VIP copy-trader) ───────────────────────────
  killers-receiver:
    # FastAPI executor: receives classified channel events from killers_bot
    # observer (running on host via systemd/nohup) → maps to Freqtrade REST
    # /forceenter & /forceexit against ft-killers-scalp.
    build: ../services/killers-receiver
    image: killers-receiver:latest
    restart: unless-stopped
    container_name: killers-receiver
    networks:
      - default
      - dokploy-network
    environment:
      KILLERS_FT_BASE_URL: http://ft-killers-scalp:8080
      # Read from the shared anchor — sibling Freqtrade containers inherit
      # *a1 which sets FREQTRADE__API_SERVER__USERNAME/PASSWORD. Hardcoding
      # would 401 against rotated creds.
      KILLERS_FT_USERNAME: ${FREQTRADE__API_SERVER__USERNAME}
      KILLERS_FT_PASSWORD: ${FREQTRADE__API_SERVER__PASSWORD}
      KILLERS_DB: /var/lib/killers/receiver.sqlite
      KILLERS_STAKE_USD: "20"
      KILLERS_LEVERAGE: "5"
      KILLERS_MAX_OPEN: "10"
    volumes:
      - killers_receiver_state:/var/lib/killers
    ports:
      - 127.0.0.1:8089:8089
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      - ft-killers-scalp

  ft-killers-scalp:
    # Freqtrade Futures dry-run bot. Pass-through strategy: all entries +
    # exits driven by killers-receiver via REST. $200 dry wallet, max 10
    # concurrent positions, leverage default 5x (matches channel's 3-5x).
    image: freqtradeorg/freqtrade:stable
    restart: always
    container_name: ft-killers-scalp
    environment:
      <<: *a1
    volumes:
      - ft_user_data:/freqtrade/user_data
      - ./user_data/configs:/freqtrade/user_data/configs:ro
      - ./user_data/strategies:/freqtrade/user_data/strategies
    ports:
      - 127.0.0.1:8099:8080
    healthcheck: *a2
    deploy:
      resources:
        limits:
          memory: 768M
    entrypoint:
      - /bin/sh
      - -c
      - sleep 60 && exec freqtrade trade --logfile /freqtrade/user_data/logs/KillersScalpV1.log --config /freqtrade/user_data/configs/KillersScalpV1.json --strategy KillersScalpV1

networks:
  default: null
  dokploy-network:
    external: true
volumes:
  prometheus_data: null
  ft_user_data: null
  ft_exporter_state: null
  insiders_state: null
  killers_receiver_state: null
  insiders_receiver_state: null
  claude_auth:
    external: true
    name: claude-assistant_claude_auth
