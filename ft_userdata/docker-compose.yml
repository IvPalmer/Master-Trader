  # macdtrendv1:  # NOT DEPLOYED — poor backtest: -$143, MACD crossovers too noisy in bear markets
  #   image: freqtradeorg/freqtrade:stable
  #   restart: unless-stopped
  #   container_name: ft-macd-trend
