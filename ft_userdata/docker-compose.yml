  #     --config /freqtrade/user_data/configs/DoubleEMACrossoverWithTrend.json
  #     --strategy DoubleEMACrossoverWithTrend

  mastertraderv1:
    image: freqtradeorg/freqtrade:stable
    restart: always
    container_name: ft-mastertraderv1
    extra_hosts: *binance-hosts
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8086:8080"
    healthcheck: *bot-healthcheck
    entrypoint: ["/bin/sh", "-c", "sleep 35 && exec freqtrade trade --logfile /freqtrade/user_data/logs/MasterTraderV1.log --config /freqtrade/user_data/configs/MasterTraderV1.json --strategy MasterTraderV1"]

  # mastertraderai:  # KILLED 2026-03-14 — -$32.32, 30% WR, bleeding $31/day
  #   image: freqtradeorg/freqtrade:stable_freqai
  #   restart: unless-stopped
