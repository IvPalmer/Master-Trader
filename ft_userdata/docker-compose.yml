---
# Pinned Binance IPs for VPN bypass (used by extra_hosts below)
# If Binance changes IPs, update these and the bypass_vpn_binance.sh routes
x-binance-hosts: &binance-hosts
  - "api.binance.com:13.226.219.154"
  - "api1.binance.com:13.226.219.154"
  - "api2.binance.com:13.226.219.154"
  - "api3.binance.com:13.226.219.154"
  - "fapi.binance.com:108.138.85.11"
  - "dapi.binance.com:13.226.219.154"
  - "data.binance.com:13.226.219.154"
  - "stream.binance.com:13.112.187.8"

# Staggered startup delays (seconds) to avoid Binance 429 rate limits
# when all bots cold-start simultaneously. Daily bots start first (least API pressure),
# then higher-frequency bots with increasing delays.
x-healthcheck: &bot-healthcheck
  test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/ping || exit 1"]
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 120s

services:
