  #   extra_hosts: *binance-hosts
  #   volumes:
  #     - "./user_data:/freqtrade/user_data"
  #   ports:
  #     - "127.0.0.1:8083:8080"
  #   command: >
  #     trade
  #     --logfile /freqtrade/user_data/logs/ElliotV5.log
  #     --config /freqtrade/user_data/configs/ElliotV5.json
  #     --strategy ElliotV5

  x-emacrossoverv1:  # KILLED 2026-03-15 — 0 trades in 20h, dead on arrival
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    container_name: ft-ema-crossover
    extra_hosts: *binance-hosts
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8083:8080"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/EMACrossoverV1.log
      --config /freqtrade/user_data/configs/EMACrossoverV1.json
      --strategy EMACrossoverV1

  supertrendstrategy:
    image: freqtradeorg/freqtrade:stable
    restart: always
    container_name: ft-supertrendstrategy
    extra_hosts: *binance-hosts
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8084:8080"
    healthcheck: *bot-healthcheck
    entrypoint: ["/bin/sh", "-c", "sleep 20 && exec freqtrade trade --logfile /freqtrade/user_data/logs/SupertrendStrategy.log --config /freqtrade/user_data/configs/SupertrendStrategy.json --strategy SupertrendStrategy"]

  # doubleemacrossoverwithtrend:  # PAUSED — worst performer (-4.14 USDT, 0/2 W/L)
  #   image: freqtradeorg/freqtrade:stable
  #   restart: unless-stopped
  #   container_name: ft-doubleemacrossoverwithtrend
  #   volumes:
  #     - "./user_data:/freqtrade/user_data"
  #   ports:
