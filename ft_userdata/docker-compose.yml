  # gaussianchannelv1:  # KILLED 2026-04-10 — ZERO trades in full-year backtest

  # ── Bear Crash Short (futures, short-only during bear regimes) ────

  # bearcrashshortv1:  # KILLED 2026-04-17 — 1h-only backtest Jul 2025-Apr 2026: PF 0.89, -12.96%, 34% DD. No edge. Revisit if futures 1m data downloaded.

  # bollingerbouncev1:  # KILLED 2026-04-17 — superseded by KeltnerBounceV1 (ATR > std for crypto)

  keltnerbouncev1:
    image: freqtradeorg/freqtrade:stable
    restart: always
    container_name: ft-keltner-bounce
    extra_hosts: *binance-hosts
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8095:8080"
    healthcheck: *bot-healthcheck
    deploy:
      resources:
        limits:
          memory: 768M
    entrypoint: ["/bin/sh", "-c", "sleep 60 && exec freqtrade trade --logfile /freqtrade/user_data/logs/KeltnerBounceV1.log --config /freqtrade/user_data/configs/KeltnerBounceV1.json --strategy KeltnerBounceV1"]

  fundingfadev1:
    image: freqtradeorg/freqtrade:stable
    restart: always
    container_name: ft-funding-fade
    extra_hosts: *binance-hosts
