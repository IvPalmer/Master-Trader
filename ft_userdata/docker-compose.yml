  x-ichimokutrendv1:  # KILLED 2026-03-15 — -$33.49, 0.17 PF, 0.23 R:R
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    container_name: ft-ichimoku-trend
    extra_hosts: *binance-hosts
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8080:8080"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/IchimokuTrendV1.log
      --config /freqtrade/user_data/configs/IchimokuTrendV1.json
      --strategy IchimokuTrendV1

  # combinedbinhandcluc:  # PAUSED — 1W/2L, -$12.41, two stop_loss hits
