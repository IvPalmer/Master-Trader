  # nasosv5:  # KILLED 2026-03-14 — +$2.10 but 1.04 PF, inverted R:R
  #   image: freqtradeorg/freqtrade:stable
  #   restart: unless-stopped
  #   container_name: ft-nasosv5
  #   extra_hosts: *binance-hosts
