  # ── Grafana Bridge (candle data proxy for dashboards) ──────────────

  grafana-bridge:
    build: ./grafana-bridge
    restart: unless-stopped
    container_name: ft-grafana-bridge
    volumes:
      - "./grafana/dashboards:/dashboards"
    deploy:
      resources:
        limits:
          memory: 192M
    depends_on:
      - keltnerbouncev1
      - fundingfadev1
      - fundingshortv1

  # ── Monitoring Stack ───────────────────────────────────────────────

  metrics-exporter:
    build:
      context: .
      dockerfile: exporter/Dockerfile
    restart: unless-stopped
    container_name: ft-metrics-exporter
    volumes:
      - "./metrics_exporter.py:/app/metrics_exporter.py:ro"
      - "./api_utils.py:/app/api_utils.py:ro"
      - "./bots_config.json:/app/bots_config.json:ro"
    ports:
      - "127.0.0.1:9090:9090"
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      - keltnerbouncev1
      - fundingfadev1
      - fundingshortv1

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    container_name: ft-prometheus
    volumes:
      - "./prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "prometheus_data:/prometheus"
    ports:
      - "127.0.0.1:9091:9090"
    deploy:
      resources:
        limits:
          memory: 256M
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    depends_on:
      - metrics-exporter

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    container_name: ft-grafana
    volumes:
      - "grafana_data:/var/lib/grafana"
      - "./grafana/provisioning:/etc/grafana/provisioning:ro"
      - "./grafana/dashboards:/var/lib/grafana/dashboards"
    ports:
      - "127.0.0.1:3030:3000"
    deploy:
      resources:
        limits:
          memory: 384M
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_DEFAULT_THEME=dark
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/freqtrade.json
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
    depends_on:
      - prometheus
      - grafana-bridge

volumes:
  prometheus_data:
  grafana_data:
