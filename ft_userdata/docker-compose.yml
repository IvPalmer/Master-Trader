  #     --config /freqtrade/user_data/configs/MasterTraderAI.json
  #     --strategy MasterTraderAI
  #     --freqaimodel LightGBMRegressor

  # nostalgiaforinfinityx6:  # KILLED — 0 trades in weeks, replaced by BollingerRSIMeanReversion
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.nfi
  #   restart: unless-stopped
  #   container_name: ft-nostalgiaforinfinityx6
  #   volumes:
  #     - "./user_data:/freqtrade/user_data"
  #   ports:
  #     - "127.0.0.1:8089:8080"
  #   command: >
  #     trade
  #     --logfile /freqtrade/user_data/logs/NostalgiaForInfinityX6.log
  #     --config /freqtrade/user_data/configs/NostalgiaForInfinityX6.json
  #     --strategy NostalgiaForInfinityX6

  bollingerrsimeanreversion:
    image: freqtradeorg/freqtrade:stable
    restart: always
    container_name: ft-bollinger-rsi
    extra_hosts: *binance-hosts
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8089:8080"
    healthcheck: *bot-healthcheck
    entrypoint: ["/bin/sh", "-c", "sleep 65 && exec freqtrade trade --logfile /freqtrade/user_data/logs/BollingerRSIMeanReversion.log --config /freqtrade/user_data/configs/BollingerRSIMeanReversion.json --strategy BollingerRSIMeanReversion"]

  # ── Futures Sniper Module ─────────────────────────────────────────
  # Phase 1: Long-only, 2x leverage, $500 dry-run, isolated margin

  futuressniper:
    image: freqtradeorg/freqtrade:stable
    restart: always
    container_name: ft-futures-sniper
    extra_hosts: *binance-hosts
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8090:8080"
    healthcheck: *bot-healthcheck
    entrypoint: ["/bin/sh", "-c", "sleep 50 && exec freqtrade trade --logfile /freqtrade/user_data/logs/FuturesSniperV1.log --config /freqtrade/user_data/configs/FuturesSniperV1.json --strategy FuturesSniperV1"]

  # ── Daily Timeframe Strategies ────────────────────────────────────

  alligatortrendv1:
    image: freqtradeorg/freqtrade:stable
    restart: always
    container_name: ft-alligator-trend
    extra_hosts: *binance-hosts
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8091:8080"
    healthcheck: *bot-healthcheck
    entrypoint: ["/bin/sh", "-c", "sleep 0 && exec freqtrade trade --logfile /freqtrade/user_data/logs/AlligatorTrendV1.log --config /freqtrade/user_data/configs/AlligatorTrendV1.json --strategy AlligatorTrendV1"]

  gaussianchannelv1:
    image: freqtradeorg/freqtrade:stable
    restart: always
    container_name: ft-gaussian-channel
    extra_hosts: *binance-hosts
    volumes:
      - "./user_data:/freqtrade/user_data"
    ports:
      - "127.0.0.1:8092:8080"
    healthcheck: *bot-healthcheck
    entrypoint: ["/bin/sh", "-c", "sleep 10 && exec freqtrade trade --logfile /freqtrade/user_data/logs/GaussianChannelV1.log --config /freqtrade/user_data/configs/GaussianChannelV1.json --strategy GaussianChannelV1"]

  # ── Grafana Bridge (candle data proxy for dashboards) ──────────────

  grafana-bridge:
    build: ./grafana-bridge
    restart: unless-stopped
    container_name: ft-grafana-bridge
    volumes:
      - "./grafana/dashboards:/dashboards"
    depends_on:
      - supertrendstrategy
      - mastertraderv1
      - bollingerrsimeanreversion
      - futuressniper
      - alligatortrendv1
      - gaussianchannelv1

  # ── Monitoring Stack ───────────────────────────────────────────────

  metrics-exporter:
    build:
      context: .
      dockerfile: exporter/Dockerfile
    restart: unless-stopped
    container_name: ft-metrics-exporter
    volumes:
      - "./metrics_exporter.py:/app/metrics_exporter.py:ro"
      - "./api_utils.py:/app/api_utils.py:ro"
      - "./bots_config.json:/app/bots_config.json:ro"
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - supertrendstrategy
      - mastertraderv1
      - bollingerrsimeanreversion
      - futuressniper

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    container_name: ft-prometheus
    volumes:
      - "./prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "prometheus_data:/prometheus"
    ports:
      - "127.0.0.1:9091:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    depends_on:
      - metrics-exporter

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    container_name: ft-grafana
    volumes:
      - "grafana_data:/var/lib/grafana"
      - "./grafana/provisioning:/etc/grafana/provisioning:ro"
      - "./grafana/dashboards:/var/lib/grafana/dashboards"
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_USERS_DEFAULT_THEME=dark
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/freqtrade.json
      - GF_INSTALL_PLUGINS=yesoreyeram-infinity-datasource
    depends_on:
      - prometheus
      - grafana-bridge

volumes:
  prometheus_data:
  grafana_data:
