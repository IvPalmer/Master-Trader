# Fleet event log — append new events here; the dashboard hot-reloads on file
# modtime change (no restart required).
#
# kind values:
#   deploy    — bot first deployed (live or dry)
#   pause     — bot manually halted
#   resume    — bot resumed after a pause
#   gate      — gate / strategy config change (e.g. gate v2 cutover)
#   milestone — fleet-level milestone (new bot added, graduation, etc.)
#
# Fields:
#   bot   — bot key as in BOTS (fundingfade | keltner | cascade | killers |
#            insiders) or "fleet" for global events
#   ts    — ISO 8601 UTC timestamp (use 00:00:00Z when exact time is unknown)
#   label — short human string shown in the UI (≤40 chars)
#   kind  — one of the kind values above

